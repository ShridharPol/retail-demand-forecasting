x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-service-account.json
    GCP_PROJECT_ID: ${GCP_PROJECT_ID}
    GCS_RAW_BUCKET: ${GCS_RAW_BUCKET}
    GCS_PROCESSED_BUCKET: ${GCS_PROCESSED_BUCKET}
    BQ_RAW_DATASET: ${BQ_RAW_DATASET}
    BQ_STAGING_DATASET: ${BQ_STAGING_DATASET}
    BQ_MARTS_DATASET: ${BQ_MARTS_DATASET}
    AIRFLOW_UID: ${AIRFLOW_UID}
    AIRFLOW_CONN_GOOGLE_CLOUD_DEFAULT: >-
      google-cloud-platform://?project=${GCP_PROJECT_ID}&key_path=/opt/airflow/credentials/gcp-service-account.json
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./credentials:/opt/airflow/credentials:ro
    - ./data:/opt/airflow/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@hamdan-infocom.com
        echo "Airflow initialised"
    restart: on-failure

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    environment:
      <<: *airflow-common-env
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    environment:
      <<: *airflow-common-env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: